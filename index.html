<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랜덤 파트너 매칭 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-box { flex: 1; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: none; box-sizing: border-box; }
        .controls { text-align: center; margin-bottom: 30px; }
        button { padding: 12px 30px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; transition: background 0.3s; }
        button:hover { background-color: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #fafafa; }
        .highlight { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>👫 랜덤 자리 배정 & 매칭</h2>

    <div class="input-group">
        <div class="input-box">
            <label>리더 명단 (쉼표로 구분)</label>
            <textarea id="maleInput">L1, L2, L3, L4, L5, L6, L7, L8, L9, L10, L11, L12, L13</textarea>
        </div>
        <div class="input-box">
            <label>팔뤄 명단 (쉼표로 구분)</label>
            <textarea id="femaleInput">F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12, F13</textarea>
        </div>
    </div>

    <div class="controls">
        <button onclick="generateMatching()">매칭 시작 & 다시 돌리기</button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>자리 번호</th>
                <th>리더 (남성)</th>
                <th>팔뤄 (여성)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateMatching() {
        // 입력값 가져오기 및 배열 변환
        const maleNames = document.getElementById('maleInput').value.split(',').map(name => name.trim()).filter(name => name !== "");
        const femaleNames = document.getElementById('femaleInput').value.split(',').map(name => name.trim()).filter(name => name !== "");

        // 인원 수 체크
        if (maleNames.length !== 13 || femaleNames.length !== 13) {
            alert("남성 13명, 여성 13명의 이름을 정확히 입력해주세요! (현재 남: " + maleNames.length + "명, 여: " + femaleNames.length + "명)");
            return;
        }

        // 이름 섞기
        const shuffledMales = shuffle([...maleNames]);
        const shuffledFemales = shuffle([...femaleNames]);

        // 결과 테이블 생성
        const resultBody = document.getElementById('resultBody');
        resultBody.innerHTML = "";
        
        for (let i = 0; i < 13; i++) {
            const row = `<tr>
                <td class="highlight">자리 ${i + 1}</td>
                <td>${shuffledMales[i]}</td>
                <td>${shuffledFemales[i]}</td>
            </tr>`;
            resultBody.innerHTML += row;
        }

        // 테이블 보이기
        document.getElementById('resultTable').style.display = 'table';
    }
</script>

</body>
</html>
