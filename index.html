<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>랜덤 파트너 매칭 프로그램</title>

    <style>

        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f7f6; }

        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        h2 { text-align: center; color: #333; }

        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }

        .input-box { flex: 1; }

        label { display: block; margin-bottom: 8px; font-weight: bold; }

        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: none; box-sizing: border-box; }

        .controls { text-align: center; margin-bottom: 30px; }

        button { padding: 12px 30px; font-size: 16px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; transition: background 0.3s; }

        button:hover { background-color: #45a049; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }

        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }

        th { background-color: #f2f2f2; }

        tr:nth-child(even) { background-color: #fafafa; }

        .highlight { font-weight: bold; color: #2c3e50; }

    </style>

</head>

<body>



<div class="container">

    <h2>👫 랜덤 자리 배정 & 매칭</h2>



    <div class="input-group">

        <div class="input-box">

            <label>리더 명단 (쉼표로 구분)</label>

            <textarea id="maleInput">L1, L2, L3, L4, L5, L6, L7, L8, L9, L10, L11, L12, L13</textarea>

        </div>

        <div class="input-box">

            <label>팔뤄 명단 (쉼표로 구분)</label>

            <textarea id="femaleInput">F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12, F13</textarea>

        </div>

    </div>



    <div class="controls">

        <button onclick="generateMatching()">매칭 시작 & 다시 돌리기</button>

    </div>



    <table id="resultTable" style="display:none;">

        <thead>

            <tr>

                <th>자리 번호</th>

                <th>리더 (남성)</th>

                <th>팔뤄 (여성)</th>

            </tr>

        </thead>

        <tbody id="resultBody"></tbody>

    </table>

</div>



<script>

    function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generateMatching() {
    // 1. 입력값 가져오기
    let maleNames = document.getElementById('maleInput').value.split(',').map(name => name.trim()).filter(name => name !== "");
    let femaleNames = document.getElementById('femaleInput').value.split(',').map(name => name.trim()).filter(name => name !== "");

    // 2. 고정 매칭 정의
    const fixedPairs = [
        { male: "봉쥬", female: "양뽁" },
        { male: "만두", female: "찐빵" }
    ];

    // 3. 인원 수 체크 (예: 13명 기준)
    if (maleNames.length < 2 || femaleNames.length < 2) {
        alert("최소한 고정 매칭 인원 이상의 명단이 필요합니다.");
        return;
    }

    // 4. 고정 매칭 대상자를 명단에서 제외 (나머지 인원만 섞기 위함)
    fixedPairs.forEach(pair => {
        maleNames = maleNames.filter(name => name !== pair.male);
        femaleNames = femaleNames.filter(name => name !== pair.female);
    });

    // 5. 남은 인원들만 랜덤하게 섞기
    const shuffledMales = shuffle([...maleNames]);
    const shuffledFemales = shuffle([...femaleNames]);

    // 6. 결과 리스트 생성 (고정 커플 먼저 넣기)
    const finalMatching = [];
    
    // 고정 커플 추가
    fixedPairs.forEach(pair => {
        finalMatching.push({ male: pair.male, female: pair.female });
    });

    // 나머지 섞인 인원 추가 (남은 인원 수만큼 반복)
    const remainingCount = Math.min(shuffledMales.length, shuffledFemales.length);
    for (let i = 0; i < remainingCount; i++) {
        finalMatching.push({ male: shuffledMales[i], female: shuffledFemales[i] });
    }

    // 7. 결과 출력 (전체 리스트를 한 번 더 섞어서 고정 커플이 항상 1, 2번에 나오지 않게 함)
    shuffle(finalMatching);

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = "";
    
    finalMatching.forEach((pair, index) => {
        const row = `<tr>
            <td class="highlight">자리 ${index + 1}</td>
            <td>${pair.male}</td>
            <td>${pair.female}</td>
        </tr>`;
        resultBody.innerHTML += row;
    });

    document.getElementById('resultTable').style.display = 'table';
}

</script>



</body>

</html>
